<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sewa Mart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .login-container {
            max-width: 450px;
            margin: 6rem auto;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            padding: 3.5rem;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 2.5rem;
            font-weight: 800;
            font-size: 2.2rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 600;
            color: var(--light-text);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
            background: #fdfdfd;
        }

        .form-group input:focus {
            border-color: var(--primary-orange);
            background: white;
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.1);
        }

        .auth-btn {
            width: 100%;
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 1rem;
            box-shadow: 0 10px 20px rgba(255, 107, 0, 0.2);
        }

        .auth-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 107, 0, 0.3);
        }

        .switch-auth {
            text-align: center;
            margin-top: 2rem;
            color: var(--light-text);
        }

        .switch-auth a {
            color: var(--primary-orange);
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .switch-auth a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <h1 onclick="window.location.href='index.html'" style="cursor:pointer">Sewa<span>Mart</span></h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart <span id="cart-count">0</span></a>
                </li>
                <li><a href="login.html" id="login-link">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="login-container" id="login-form">
            <h2>Login</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="auth-btn">Login</button>
            </form>
            <p class="switch-auth">Don't have an account? <a href="#" onclick="toggleAuth()">Register</a></p>
        </div>

        <div class="login-container" id="register-form" style="display: none;">
            <h2>Register</h2>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required placeholder="Enter your password">
                </div>
                <div class="form-group">
                    <label for="reg-phone">Phone Number</label>
                    <input type="tel" id="reg-phone" required placeholder="Enter your phone number">
                </div>
                <div class="form-group">
                    <label for="reg-admin-code">Admin Secret Code (Optional)</label>
                    <input type="password" id="reg-admin-code" placeholder="Enter code for admin access">

                </div>
                <button type="submit" class="auth-btn">Register</button>
            </form>
            <p class="switch-auth">Already have an account? <a href="#" onclick="toggleAuth()">Login</a></p>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Sewa Mart. All Rights Reserved.</p>
    </footer>

    <script src="js/script.js"></script>
    <script>
        function toggleAuth() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            }
        }

        async function getCoordinates() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    return resolve(null);
                }
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        });
                    },
                    () => resolve(null),
                    { timeout: 5000 }
                );
            });
        }

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const location = await getCoordinates();

            try {
                const response = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, location })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userEmail', data.email);
                    localStorage.setItem('userRoles', JSON.stringify(data.roles));

                    alert('Login successful!');
                    if (data.roles.includes('ADMIN')) {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    alert('Invalid credentials');
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Connection error. Is the backend running?');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const phone = document.getElementById('reg-phone').value;
            const adminCode = document.getElementById('reg-admin-code').value;
            const location = await getCoordinates();

            const payload = { name, email, password, phone, location };
            if (adminCode === 'admin123') {
                payload.role = 'ADMIN';
            }

            try {
                const response = await fetch('http://localhost:8080/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('Registration successful! Please login.');
                    toggleAuth();
                } else {
                    const error = await response.text();
                    alert('Registration failed: ' + error);
                }
            } catch (error) {
                console.error('Registration error:', error);
                alert('Connection error.');
            }
        }
    </script>
</body>

</html>
